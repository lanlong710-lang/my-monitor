name: 5分钟实时监控推送

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  monitor_job:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置Python环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安装依赖
        run: pip install requests

      - name: 执行监控脚本
        env:
          SCKEY: ${{ secrets.SCKEY }}
        run: python 20260326_01_推特与币安监控脚本.py

      - name: 自动同步状态
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add monitor_state.json
          git commit -m "自动更新记录 [skip ci]" || exit 0
          git push
